<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Quantum Eigenvalue Processing coursework diagram</title>
  <desc id="desc">A compact explanatory pipeline for a CS710 course project on Quantum Eigenvalue Processing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0f2a3b"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="980" height="360" rx="26" fill="url(#bg)"/>
  <text x="48" y="62" fill="#e0f2fe" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Quantum Eigenvalue Processing</text>
  <text x="48" y="96" fill="#93c5fd" font-size="15" font-family="Inter,Arial,sans-serif">Course-project overview: polynomial transformations beyond the standard Hermitian/QSVT setting.</text>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(60 165)"><rect width="145" height="82" rx="16" fill="#172554" stroke="#38bdf8" stroke-opacity=".5"/><text x="72.5" y="35" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Block-encoded</text><text x="72.5" y="59" text-anchor="middle" fill="#bfdbfe" font-size="13">matrix A</text></g>
    <g transform="translate(245 165)"><rect width="145" height="82" rx="16" fill="#172554" stroke="#38bdf8" stroke-opacity=".5"/><text x="72.5" y="35" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Polynomial</text><text x="72.5" y="59" text-anchor="middle" fill="#bfdbfe" font-size="13">approximation</text></g>
    <g transform="translate(430 165)"><rect width="160" height="82" rx="16" fill="#172554" stroke="#38bdf8" stroke-opacity=".5"/><text x="80" y="34" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">History states</text><text x="80" y="59" text-anchor="middle" fill="#bfdbfe" font-size="13">Chebyshev / Faber</text></g>
    <g transform="translate(630 165)"><rect width="145" height="82" rx="16" fill="#172554" stroke="#38bdf8" stroke-opacity=".5"/><text x="72.5" y="35" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">QEVT</text><text x="72.5" y="59" text-anchor="middle" fill="#bfdbfe" font-size="13">transformation</text></g>
    <g transform="translate(815 165)"><rect width="105" height="82" rx="16" fill="#164e63" stroke="#38bdf8" stroke-opacity=".5"/><text x="52.5" y="35" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">p(A)</text><text x="52.5" y="59" text-anchor="middle" fill="#bfdbfe" font-size="13">state</text></g>
  </g>
  <g stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)">
    <line x1="213" y1="206" x2="235" y2="206"/><line x1="398" y1="206" x2="420" y2="206"/><line x1="598" y1="206" x2="620" y2="206"/><line x1="783" y1="206" x2="805" y2="206"/>
  </g>
  <text x="490" y="305" fill="#cbd5e1" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14">Short coursework card only — not presented as original research.</text>
</svg>
